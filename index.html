<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" id="app-manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" id="apple-app-title" content="Pointeuse DZ" />
    <title>Pyjama DZ Pointeuse — Système de Pointage PWA</title>
    <script>
      (function() {
        try {
          var path = window.location.pathname.toLowerCase();
          var manifestUrl = '/manifest.json';
          var title = 'Pyjama DZ';
          if (path.indexOf('/employees') !== -1 || path.indexOf('/scanner') !== -1) {
            manifestUrl = '/manifest-employees.json';
            title = 'Espace Employé';
            localStorage.setItem('pyjama_last_portal', '/employees');
          } else if (path.indexOf('/admin') !== -1) {
            manifestUrl = '/manifest-admin.json';
            title = 'Espace Direction';
            localStorage.setItem('pyjama_last_portal', '/admin');
          } else if (path.indexOf('/qr') !== -1) {
            manifestUrl = '/manifest-qr.json';
            title = 'Écran Mural QR';
            localStorage.setItem('pyjama_last_portal', '/QR');
          }
          var mLink = document.getElementById('app-manifest');
          if (mLink) mLink.href = manifestUrl;
          var aMeta = document.getElementById('apple-app-title');
          if (aMeta) aMeta.content = title;
          if (title !== 'Pyjama DZ') document.title = title + ' — Pyjama DZ';
        } catch(e) {}
      })();
    </script>
  </head>
  <body class="bg-white text-slate-900 antialiased selection:bg-emerald-500 selection:text-white">
    <div id="root">
      <div style="min-height: 100vh; background-color: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: system-ui, -apple-system, sans-serif; text-align: center; padding: 20px;">
        <div style="width: 56px; height: 56px; border-radius: 16px; background: linear-gradient(135deg, #059669, #14b8a6); display: flex; align-items: center; justify-content: center; color: white; font-weight: 900; font-size: 20px; box-shadow: 0 10px 25px -5px rgba(5, 150, 105, 0.3); margin-bottom: 20px;">
          DZ
        </div>
        <div style="width: 36px; height: 36px; border: 4px solid rgba(5, 150, 105, 0.2); border-top-color: #059669; border-radius: 50%; animation: pyjamaSpin 0.8s linear infinite; margin-bottom: 16px;"></div>
        <div style="font-size: 15px; font-weight: 800; color: #0f172a;">Pyjama DZ Pointeuse</div>
        <div style="font-size: 12px; font-weight: 600; color: #64748b; margin-top: 4px;">Chargement instantané...</div>
      </div>
      <style>
        @keyframes pyjamaSpin { to { transform: rotate(360deg); } }
      </style>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
